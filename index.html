<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SanaBung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="frontend/css/style.css" />

    <script
      src="https://kit.fontawesome.com/7e50d5f440.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <aside class="sidebar">
      <h1 class="sidebar-title">SanaBung</h1>
      <nav class="navigation">
        <ul class="navigation-items">
          <li class="navigation-item">
            <a href=""
              ><i class="fa-solid fa-house-chimney fa-fw"></i>Dashboard</a
            >
          </li>
          <li class="navigation-item">
            <a href=""><i class="fa-solid fa-calendar fa-fw"></i>Schedule</a>
          </li>
          <li class="navigation-item">
            <a href=""><i class="fa-solid fa-chart-bar fa-fw"></i>Statistics</a>
          </li>
          <li class="navigation-item">
            <a href="frontend/pages/goals.html"
              ><i class="fa-solid fa-bullseye fa-fw"></i>Goals</a
            >
          </li>
        </ul>
      </nav>
    </aside>

    <div class="vertical-line"></div>

    <main class="main">
      <header class="header">
        <div class="searchbar-container">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Search goals..." class="searchbar" />
        </div>
        <div class="button-container">
          <button class="btn notification">
            <i class="fa-regular fa-bell"></i>
          </button>
          <button class="btn profile"><i class="fa-solid fa-user"></i></button>
        </div>
      </header>
      <div class="dashboard-grid">
        <section class="progress-goals item">
          <h2>My Progress</h2>
          <p>Goal progress cards will appear here</p>
        </section>

        <section class="schedule item">
          <h2>Schedule</h2>
          <p>Saving schedule will appear here</p>
        </section>

        <section class="statistics item">
          <h2>Statistics</h2>
          <p>Saving statistics will appear here</p>
        </section>

        <section class="upcoming item">
          <h2>Upcoming</h2>
          <p>Upcoming savings will appear here</p>
        </section>
      </div>
      <!-- <section class="controls-container">
        <div class="controls">
          <button class="btn-control">In Progress</button>
          <button class="btn-control">Complete</button>
        </div>
      </section> -->

      <!-- <section id="goals-container" class="goals-container"></section> -->

      <button class="add-goal-handler" id="add-goal-handler">+ Add Goal</button>
    </main>

    <script type="module" src="/frontend/js/main.js"></script>
  </body>
</html>
